<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>間取り図ジェネレーター</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="top-page">

    <!-- Logo -->
    <div class="top-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <h1>間取り図ジェネレーター</h1>
    </div>

    <p class="top-tagline">不動産スタッフのための、シンプルな間取り図作成ツール</p>

    <!-- Mode cards -->
    <div class="mode-cards">

      <!-- ゼロから作成 -->
      <a class="mode-card" href="editor.html">
        <div class="mode-card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <h2>ゼロから作成</h2>
        <p>キャンバス上にドラッグ＆ドロップで<br>部屋・壁・ドア・窓を自由に配置します。</p>
        <div class="mode-card-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </a>

      <!-- 手描き読み込み -->
      <a class="mode-card mode-card--disabled" href="#" onclick="return false">
        <div class="mode-card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <h2>手描き図面を読み込む</h2>
        <p>写真やスキャン画像をアップロードすると<br>AIが自動でデジタル間取り図に変換します。</p>
        <div class="mode-card-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </a>

    </div>

    <p class="top-footer">PNG / SVG 出力対応 &nbsp;·&nbsp; ブラウザのみで動作 &nbsp;·&nbsp; 保存不要</p>
  </div>
</body>
</html>
